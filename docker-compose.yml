services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-st}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-st}
      POSTGRES_DB: ${POSTGRES_DB:-st}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-st} -d ${POSTGRES_DB:-st}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-st}:${POSTGRES_PASSWORD:-st}@postgres:5432/${POSTGRES_DB:-st}?schema=public
      API_PORT: ${API_PORT:-3000}
      API_HOST: "0.0.0.0"
      BOT_KEY: ${BOT_KEY:-}
      BOT_AUTH_ENABLED: ${BOT_AUTH_ENABLED:-0}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${API_PORT:-3000}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  bot:
    build:
      context: .
      dockerfile: packages/bot/Dockerfile
    restart: unless-stopped
    # Operator launch profiles (live token + flag set) live in ./deploy/*.env, loaded if present and
    # injected straight into the container (this is how the FLEET_SCALE/CONTRACTS/GALAXY_CRAWL/etc.
    # levers reach the bot — they are NOT in the `environment:` block below). `bot.greenfield.env` is
    # the reset-agnostic LIVE profile (see deploy/bot.greenfield.env.example); `bot.env` is the legacy
    # profile. Listed last wins when both exist. With NEITHER present the bot comes up in DRY_RUN
    # (no live SpaceTraders calls, no token needed) so `docker compose up` smoke-tests the stack.
    #
    # ⚠ For a LIVE run also pass the same file via `--env-file` so DRY_RUN=0 + the token resolve in
    # the `environment:` block (which overrides env_file and defaults DRY_RUN→1 otherwise):
    #     docker compose --env-file deploy/bot.greenfield.env up --build
    env_file:
      - path: ./deploy/bot.env
        required: false
      - path: ./deploy/bot.greenfield.env
        required: false
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:3000}
      BOT_KEY: ${BOT_KEY:-}
      # SYSTEM is intentionally NOT set here so it stays sourced from the env_file (or host env).
      # Left unset on a live run (DRY_RUN=0), the bot auto-detects home from the agent's HQ via
      # resolveHome() — reset-agnostic, no hardcoded system. Pin SYSTEM in deploy/bot.env only to
      # override auto-detect. (A compose `environment:` entry would clobber the env_file value.)
      # Default-on smoke mode. Set DRY_RUN=0 (and supply a token) in deploy/bot.env for a live run.
      DRY_RUN: ${DRY_RUN:-1}
      DRY_RUN_CREDITS: ${DRY_RUN_CREDITS:-250000}
      SPACETRADERS_PLAYER_AGENT_TOKEN: ${SPACETRADERS_PLAYER_AGENT_TOKEN:-}
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
