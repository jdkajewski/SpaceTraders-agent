services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-st}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-st}
      POSTGRES_DB: ${POSTGRES_DB:-st}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-st} -d ${POSTGRES_DB:-st}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-st}:${POSTGRES_PASSWORD:-st}@postgres:5432/${POSTGRES_DB:-st}?schema=public
      API_PORT: ${API_PORT:-3000}
      API_HOST: "0.0.0.0"
      BOT_KEY: ${BOT_KEY:-}
      BOT_AUTH_ENABLED: ${BOT_AUTH_ENABLED:-0}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${API_PORT:-3000}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  bot:
    build:
      context: .
      dockerfile: packages/bot/Dockerfile
    restart: unless-stopped
    # Operator launch profile (live token + flag set) lives in ./deploy/bot.env, loaded if present.
    # Left absent, the bot comes up in DRY_RUN (no live SpaceTraders calls, no token needed) so
    # `docker compose up` smoke-tests the full stack out of the box.
    env_file:
      - path: ./deploy/bot.env
        required: false
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:3000}
      BOT_KEY: ${BOT_KEY:-}
      SYSTEM: ${SYSTEM:-X1-PP30}
      # Default-on smoke mode. Set DRY_RUN=0 (and supply a token) in deploy/bot.env for a live run.
      DRY_RUN: ${DRY_RUN:-1}
      DRY_RUN_CREDITS: ${DRY_RUN_CREDITS:-250000}
      SPACETRADERS_PLAYER_AGENT_TOKEN: ${SPACETRADERS_PLAYER_AGENT_TOKEN:-}
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
