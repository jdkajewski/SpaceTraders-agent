services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-st}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-st}
      POSTGRES_DB: ${POSTGRES_DB:-st}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-st} -d ${POSTGRES_DB:-st}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-st}:${POSTGRES_PASSWORD:-st}@postgres:5432/${POSTGRES_DB:-st}?schema=public
      API_PORT: ${API_PORT:-3000}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - full

  bot:
    build:
      context: .
      dockerfile: packages/bot/Dockerfile
    restart: unless-stopped
    environment:
      API_BASE_URL: http://api:3000
      ST_TOKEN: ${ST_TOKEN}
      SYSTEM: ${SYSTEM:-X1-PP30}
    depends_on:
      - api
    profiles:
      - full

volumes:
  pgdata:
